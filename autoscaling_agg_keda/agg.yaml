apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-agg
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 2
      extraPodMetadata:
        annotations:
          prometheus.io/path: /metrics
          prometheus.io/port: "8000"
          prometheus.io/scrape: "true"
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
    VllmDecodeWorker:
      componentType: worker
      replicas: 2
      scalingAdapter:
        enabled: true
      extraPodMetadata:
        annotations:
          prometheus.io/path: /metrics
          prometheus.io/port: "9090"
          prometheus.io/scrape: "true"
      resources:
        limits:
          gpu: "1"
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          workingDir: /workspace/examples/backends/vllm
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - Qwen/Qwen3-0.6B
            # The gpupool GPU is an NVIDIA A10-24Q vGPU: only ~23.7 GiB is visible and
            # ~21.34 GiB is free at startup. vLLM's default --gpu-memory-utilization of 0.9
            # needs 21.35 GiB, which is just over what's free, so the engine crashes with
            # "Free memory ... is less than desired GPU memory utilization". Qwen3-0.6B is
            # tiny, so 0.8 is plenty and leaves headroom for the vGPU's reserved slice.
            - --gpu-memory-utilization
            - "0.8"
